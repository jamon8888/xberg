name: CI MCP Server

on:
  push:
    branches: [main, "feature/**", "fix/**"]
    paths:
      - "mcp-server/**"
      - "crates/xberg-rag/**"
      - "crates/xberg-rag-node/**"
      - "crates/xberg-node/**"
      - "crates/xberg-wasm/**"
      - "packages/xberg-web-ui/**"
      - "packages/xberg-wasm-runtime/**"
      - "docker/Dockerfile.mcp-server"
      - ".github/workflows/ci-mcp.yaml"
  pull_request:
    branches: [main, "feature/**", "fix/**"]
    paths:
      - "mcp-server/**"
      - "crates/xberg-rag/**"
      - "crates/xberg-rag-node/**"
      - "crates/xberg-node/**"
      - "crates/xberg-wasm/**"
      - "packages/xberg-web-ui/**"
      - "packages/xberg-wasm-runtime/**"
      - "docker/Dockerfile.mcp-server"
      - ".github/workflows/ci-mcp.yaml"
  workflow_dispatch:

concurrency:
  group: ci-mcp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mcp-typecheck:
    name: MCP TypeScript type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      # The mcp-server file: dep `xberg-wasm-runtime` resolves to its built
      # dist/, which is gitignored — build it before mcp-server's npm ci copies
      # the dependency. `@xberg-io/xberg-wasm` resolves via its committed .d.ts
      # bindings (the ~97MB wasm binary is not needed for type-check/build).
      - name: Build xberg-wasm-runtime (dist)
        working-directory: packages/xberg-wasm-runtime
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: node_modules/.bin/tsc --noEmit

  mcp-test:
    name: MCP unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Build xberg-wasm-runtime (dist)
        working-directory: packages/xberg-wasm-runtime
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install dependencies
        run: npm ci

      # Wasm-engine suites (initializeEngine → 97MB wasm binary + HF model) are
      # skipped here; the pure-logic suites still run. See mcp-server/vitest.config.ts.
      - name: Run tests
        run: npm test -- run
        env:
          XBERG_SKIP_WASM_TESTS: "1"

  mcp-build:
    name: MCP build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Build xberg-wasm-runtime (dist)
        working-directory: packages/xberg-wasm-runtime
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build


  rag-lint:
    name: xberg-rag Rust lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          key: rag-lint

      - name: cargo fmt
        run: cargo fmt -p xberg-rag -p xberg-rag-node -- --check

      - name: cargo clippy
        run: cargo clippy -p xberg-rag -p xberg-rag-node -- -D warnings

  mcp-docker-smoke:
    # Functionally builds AND runs docker/Dockerfile.mcp-server end-to-end.
    # Uses TARGET=x86_64-unknown-linux-musl (not the aarch64 default the
    # Dockerfile deploys with) on purpose: this ubuntu-latest runner is
    # amd64 and cannot execute an aarch64 binary, so an arm64-target image
    # could be built here but never actually started to prove it works.
    # x86_64 exercises the exact same COPY/npm-ci/file: dependency assembly
    # logic — the part most likely to break — so it stands in for the real
    # deployment target for functional verification. See mcp-docker-arm64
    # below for the aarch64-specific check this can't cover.
    name: MCP Docker image build + smoke test (linux/x64 musl)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jamon8888/actions/free-disk-space-linux@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.mcp-server
          push: false
          load: true
          tags: xberg-mcp-server:ci
          build-args: TARGET=x86_64-unknown-linux-musl
          cache-from: type=gha,scope=ci-mcp-docker-x64
          cache-to: type=gha,mode=max,scope=ci-mcp-docker-x64

      - name: Start container
        run: |
          # -i keeps stdin open: mcp-server/src/index.ts connects a
          # StdioServerTransport before starting the HTTP transport, and
          # Docker closes stdin by default without -i, which some MCP SDK
          # transport implementations treat as an immediate disconnect.
          docker run -d -i --name mcp-smoke \
            -e XBERG_MCP_UI_TOKEN=ci-smoke-test-token \
            -p 8080:8080 \
            xberg-mcp-server:ci

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health; then
              echo "healthy"
              exit 0
            fi
            sleep 2
          done
          echo "::error::mcp-server did not become healthy within 60s"
          exit 1

      - name: Container logs
        if: always()
        run: docker logs mcp-smoke || true

      - name: Clean up
        if: always()
        run: docker rm -f mcp-smoke || true

  mcp-docker-arm64:
    # Cross-compiles the napi-builder stage for the real deployment target
    # (aarch64-unknown-linux-musl, e.g. Oracle Ampere A1) and checks the
    # resulting .node artifacts are well-formed ARM64 ELF binaries. Doesn't
    # run them — an amd64 runner can't execute aarch64 machine code without
    # QEMU, and this repo's existing arm64 NAPI builds (see
    # node-bindings-musl in .github/workflows/publish.yaml) don't use QEMU
    # either, relying on cargo's native cross-compilation support instead.
    name: MCP native addons cross-compile (linux/arm64 musl)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jamon8888/actions/free-disk-space-linux@v1

      - name: Build napi-builder stage
        run: |
          docker build \
            --target napi-builder \
            -f docker/Dockerfile.mcp-server \
            --build-arg TARGET=aarch64-unknown-linux-musl \
            -t xberg-mcp-napi-arm64:ci \
            .

      - name: Verify artifact architecture
        run: |
          docker run --rm xberg-mcp-napi-arm64:ci sh -c '
            set -e
            for f in /build/*.node; do
              echo "=== $f ==="
              file "$f"
              file "$f" | grep -q "ARM aarch64" || { echo "::error::$f is not an ARM aarch64 binary"; exit 1; }
            done
          '
